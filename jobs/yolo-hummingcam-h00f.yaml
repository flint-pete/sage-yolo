# ──────────────────────────────────────────────────────────────
# YOLO Object Counter — H00F hummingbird cam (CONTINUOUS, scheduler-managed)
#
# This is the DEFAULT/recommended mode for the hummingbird cam. It samples a
# frame every 60 seconds, which is required to actually catch hummingbirds:
# they visit the feeder for only a few seconds, so a slow sampling rate misses
# them almost entirely. (When this ran as a */10 one-shot cron, bird detections
# collapsed from ~15/day to ~0 — the bird is rarely in-frame at the 10-min mark.)
#
# CONTINUOUS vs ONE-SHOT — choose your mode:
#   • CONTINUOUS (this file): --continuous Y --interval 60, scheduler keeps the
#     pod running, captures every 60s. Best detection; holds the GPU. Use for
#     fast/intermittent subjects like hummingbirds.
#   • ONE-SHOT  (jobs/yolo-hummingcam-h00f-oneshot.yaml): --continuous N on a
#     cron schedule (e.g. */10). One capture per tick, frees the GPU between
#     ticks. Fine for slow-changing scenes (clouds, parking lots, snow depth),
#     too sparse for birds. See that file's header for the trade-offs.
#
# Image: ECR app beckman/yolo-object-counter:0.2.0
# Camera: Reolink RLC-811A snapshot CGI (creds as query params).
#
# Submit (with a write-scoped token):
#   sesctl --server https://es.sagecontinuum.org --token "$SES_USER_TOKEN" create -f jobs/yolo-hummingcam-h00f.yaml
#   sesctl ... submit -j <returned-id>
# ──────────────────────────────────────────────────────────────
name: yolo-hummingcam
plugins:
  - name: yolo-object-counter
    pluginSpec:
      image: registry.sagecontinuum.org/beckman/yolo-object-counter:0.2.0
      args:
        - "--snapshot-url"
        - "http://10.107.0.221:10000/cgi-bin/api.cgi?cmd=Snap&channel=0&rs=snap&user=sage&password=SageCam!&width=640&height=360"
        - "--model"
        - "yolo11x.pt"
        - "--conf-thres"
        - "0.25"
        - "--continuous"
        - "Y"
        - "--interval"
        - "60"
        - "--upload-image"
        - "Y"
      selector:
        resource.gpu: "true"
nodes:
  H00F: true
scienceRules:
  # Continuous: schedule the plugin to run and stay running (no cronjob()).
  # The plugin's own --continuous Y / --interval 60 loop drives the 60s cadence.
  - "schedule(yolo-object-counter): True"
successcriteria:
  - WallClock('30day')
